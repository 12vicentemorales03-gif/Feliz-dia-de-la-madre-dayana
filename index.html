<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para Dayana 💖</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      color: #333;
    }

    .container {
      max-width: 900px;
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);
    }

    header {
      background: #e91e63;
      color: white;
      padding: 30px;
      text-align: center;
    }

    .heart {
      font-size: 40px;
      animation: beat 1s infinite;
      display: block;
      margin-top: 10px;
    }

    @keyframes beat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }

    .content {
      padding: 25px;
      text-align: center;
    }

    button {
      background: #e91e63;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #c2185b;
    }

    /* Instagram story style */
    .story {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10;
      color: white;
    }

    .bars {
      position: absolute;
      top: 10px;
      width: 90%;
      display: flex;
      gap: 4px;
    }

    .bar {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.3);
      overflow: hidden;
    }

    .bar div {
      height: 100%;
      width: 0;
      background: white;
      animation: fill 3s linear forwards;
    }

    @keyframes fill {
      to { width: 100%; }
    }

    .story img {
      max-width: 90%;
      max-height: 75vh;
      border-radius: 15px;
    }

    .username {
      position: absolute;
      top: 20px;
      left: 20px;
      font-weight: bold;
    }

    /* Final */
    .final {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      color: white;
      justify-content: center;
      align-items: center;
      text-align: center;
      flex-direction: column;
      z-index: 20;
      padding: 20px;
    }

    .nombre {
      font-size: 70px;
      font-weight: bold;
      color: #ff4d6d;
      animation: zoom 1.2s infinite alternate;
      text-shadow: 0 0 25px #ff4d6d;
    }

    @keyframes zoom {
      from { transform: scale(1); }
      to { transform: scale(1.2); }
    }

    /* hearts + tulips */
    .fall {
      position: fixed;
      top: -10px;
      font-size: 22px;
      animation: fall linear forwards;
      z-index: 5;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

<audio id="musica" src="cancion.mp3" loop></audio>

<div class="container">
  <header>
    <h1>Feliz Día de la Madre, Dayana 💖</h1>
    <span class="heart">❤️</span>
  </header>

  <div class="content">
    <button onclick="iniciarHistoria()">Mensaje especial 💌</button>
  </div>
</div>

<!-- Instagram story -->
<div class="story" id="story">
  <div class="username">Dayana 💖</div>
  <div class="bars" id="bars"></div>
  <img id="foto" src="" />
</div>

<!-- Final -->
<div class="final" id="final">
  <div class="nombre">DAYANA</div>
  <p style="font-size:22px; max-width:600px;">
    Te elegiría en todas las vidas, en todos los mundos y en todas las historias.
    Gracias por ser la mamá de nuestro hijo y mi familia. 💖
  </p>
</div>

<script>
const fotos = [];
for(let i=1;i<=28;i++) fotos.push("foto"+i+".jpg");

let i = 0;
let intervalo;

function iniciarHistoria() {
  document.getElementById("musica").play();
  document.getElementById("story").style.display = "flex";

  crearBarras();
  mostrarFoto();
}

function crearBarras() {
  const bars = document.getElementById("bars");
  bars.innerHTML = "";

  fotos.forEach(() => {
    const b = document.createElement("div");
    b.className = "bar";
    const fill = document.createElement("div");
    b.appendChild(fill);
    bars.appendChild(b);
  });
}

function mostrarFoto() {
  const img = document.getElementById("foto");
  img.src = fotos[i];

  const bars = document.querySelectorAll(".bar div");
  if (bars[i]) bars[i].style.animation = "fill 3s linear forwards";

  intervalo = setTimeout(() => {
    i++;
    if (i >= fotos.length) {
      document.getElementById("story").style.display = "none";
      mostrarFinal();
      return;
    }
    mostrarFoto();
  }, 3000);
}

function mostrarFinal() {
  document.getElementById("final").style.display = "flex";
  lluvia();
  lluviaTulipanes();
}

function lluvia() {
  setInterval(() => {
    const e = document.createElement("div");
    e.className = "fall";
    e.innerHTML = "❤️";
    e.style.left = Math.random()*100+"vw";
    e.style.animationDuration = (3+Math.random()*3)+"s";
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),6000);
  },200);
}

function lluviaTulipanes() {
  setInterval(() => {
    const e = document.createElement("div");
    e.className = "fall";
    e.innerHTML = "🌷 DAYANA 🌷";
    e.style.left = Math.random()*100+"vw";
    e.style.animationDuration = (4+Math.random()*3)+"s";
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),7000);
  },500);
}
</script>

</body>
</html>
